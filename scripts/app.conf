# App-specific configuration for the release pipeline.
# Both release.sh and ios-appstore.sh source this file.

# -- Identity -----------------------------------------------------------------
APP_NAME=PearGuard                          # Display name (used in logs, Nostr posts)
BUNDLE_ID=com.pearguard                     # iOS bundle ID and Android package name
ARTIFACT_PREFIX=pearguard                   # Prefix for APK/AAB filenames (e.g. pearguard-v0.1.0.apk)

# -- iOS / Xcode --------------------------------------------------------------
XCODE_WORKSPACE=ios/PearGuard.xcworkspace
XCODE_SCHEME=PearGuard
XCODE_PROJECT=ios/PearGuard.xcodeproj/project.pbxproj
IOS_PROVISIONING_PROFILE="PearGuard App Store"

# -- Android signing -----------------------------------------------------------
KEY_ALIAS_DEFAULT=pearguard

# -- Mac Mini build host -------------------------------------------------------
MAC_MINI_REPO_PATH=~/peerloomllc/pearguard

# -- Nostr announcement --------------------------------------------------------
APP_TAGLINE="A peer-to-peer parental control app"
APP_WEBSITE=https://peerloomllc.com/pearguard/
NOSTR_HASHTAGS="#PearGuard #Nostr #Bitcoin #P2P #parenting #family #screentime #Android #iOS #Zapstore"
