<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PearGuard Windows - Phase 1 Smoke Test</title>
  <style>
    body { font-family: monospace; padding: 20px; max-width: 700px; }
    h1 { font-size: 18px; }
    .row { padding: 6px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; gap: 20px; }
    .label { font-weight: bold; }
    .val { color: #333; word-break: break-all; text-align: right; }
    .ok { color: #0a0; }
    .err { color: #a00; }
    pre { background: #f6f6f6; padding: 10px; border-radius: 4px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>PearGuard Windows - Phase 1 Smoke Test</h1>
  <div id="rows"></div>
  <h2>Events</h2>
  <pre id="events"></pre>

  <script>
    const rowsEl = document.getElementById('rows');
    const eventsEl = document.getElementById('events');

    function addRow(label, val, cls) {
      const r = document.createElement('div');
      r.className = 'row';
      r.innerHTML = `<span class="label">${label}</span><span class="val ${cls || ''}">${val}</span>`;
      rowsEl.appendChild(r);
    }

    // Capture any events that arrive via the preload bridge
    window.__pearEvent = (name, data) => {
      eventsEl.textContent += `[${name}] ${JSON.stringify(data)}\n`;
    };

    async function call(method, args) {
      return new Promise((resolve, reject) => {
        const id = Date.now() + Math.random();
        const prev = window.__pearResponse;
        window.__pearResponse = (rid, result, error) => {
          if (rid !== id) return prev && prev(rid, result, error);
          window.__pearResponse = prev;
          if (error) reject(new Error(error));
          else resolve(result);
        };
        window.ReactNativeWebView.postMessage(JSON.stringify({ id, method, args: args || {} }));
      });
    }

    (async () => {
      try {
        const pong = await call('ping');
        addRow('ping ->', JSON.stringify(pong), 'ok');
      } catch (e) { addRow('ping ->', e.message, 'err'); }

      try {
        const mode = await call('identity:getMode');
        addRow('identity:getMode ->', JSON.stringify(mode), 'ok');
      } catch (e) { addRow('identity:getMode ->', e.message, 'err'); }

      try {
        const theme = await call('settings:getTheme');
        addRow('settings:getTheme ->', JSON.stringify(theme), 'ok');
      } catch (e) { addRow('settings:getTheme ->', e.message, 'err'); }

      try {
        await call('setMode', ['child']);
        addRow('setMode(child) ->', 'ok', 'ok');
        const mode2 = await call('identity:getMode');
        addRow('identity:getMode (after) ->', JSON.stringify(mode2), 'ok');
      } catch (e) { addRow('setMode ->', e.message, 'err'); }

      try {
        await call('identity:setName', { name: 'Windows Test' });
        addRow('identity:setName ->', 'ok', 'ok');
        const name = await call('identity:getName');
        addRow('identity:getName ->', JSON.stringify(name), 'ok');
      } catch (e) { addRow('identity:setName ->', e.message, 'err'); }

      try {
        await call('setMode', ['parent']);
        const invite = await call('invite:generate');
        const ok = invite && invite.inviteLink && invite.inviteLink.startsWith('pear');
        addRow('invite:generate ->', invite.inviteLink.slice(0, 60) + '...', ok ? 'ok' : 'err');
      } catch (e) { addRow('invite:generate ->', e.message, 'err'); }
    })();
  </script>
</body>
</html>
