<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self';">
  <title>PearGuard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --fg: #e6edf3;
      --muted: #8b949e;
      --accent: #5b9bff;
      --danger: #f85149;
      --card: #161b22;
      --border: #30363d;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .card {
      width: min(560px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      text-align: center;
    }
    .shield {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 16px;
    }
    .app-name {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 8px;
    }
    .reason {
      font-size: 16px;
      color: var(--muted);
      margin: 0 0 28px;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    button {
      font: inherit;
      font-size: 16px;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
      font-weight: 600;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .time-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 8px;
    }
    .time-grid button { padding: 12px; }
    .pin-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .pin-row input {
      flex: 1;
      padding: 14px;
      font-size: 18px;
      letter-spacing: 6px;
      text-align: center;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .status {
      font-size: 14px;
      margin-top: 14px;
      min-height: 18px;
    }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--accent); }
    .hidden { display: none !important; }
    .back {
      background: transparent;
      color: var(--muted);
      border: none;
      padding: 8px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="shield">🛡️</div>
    <p class="app-name" id="app-name">App blocked</p>
    <p class="reason" id="reason">This app is blocked.</p>

    <div id="main-actions" class="actions">
      <button id="btn-request" class="primary">Request More Time</button>
      <button id="btn-pin">Enter PIN</button>
    </div>

    <div id="time-actions" class="actions hidden">
      <div class="time-grid" id="time-grid"></div>
      <button class="back" id="time-back">Cancel</button>
      <div class="status" id="time-status"></div>
    </div>

    <div id="pin-actions" class="actions hidden">
      <div class="pin-row">
        <input id="pin-input" type="password" inputmode="numeric" maxlength="8" autocomplete="off" />
        <button id="btn-pin-submit" class="primary">Unlock</button>
      </div>
      <button class="back" id="pin-back">Cancel</button>
      <div class="status" id="pin-status"></div>
    </div>
  </div>

  <script src="overlay-renderer.js"></script>
</body>
</html>
